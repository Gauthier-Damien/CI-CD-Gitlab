# GitLab CI/CD Pipeline
# Stages: build → test → lint → deploy-staging → deploy-production

stages:
  - build
  - test
  - lint
  - deploy-staging
  - deploy-production

# ─── Global variables ───────────────────────────────────────────────────────────
variables:
  DOCKER_IMAGE: $CI_REGISTRY_IMAGE
  DOCKER_TAG: $CI_COMMIT_SHORT_SHA

# ═══════════════════════════════════════════════════════════════════════════════
# STAGE: build
# ═══════════════════════════════════════════════════════════════════════════════

build:
  stage: build
  script:
    - python3 --version
    - python3 -m venv .venv
    - . .venv/bin/activate
    - python -m pip install --quiet --upgrade pip
    - echo "Installing production dependencies..."
    - pip install --quiet -r requirements.txt
    - echo "Build successful ✔"
  artifacts:
    paths:
      - requirements.txt
    expire_in: 1 hour

build-docker:
  stage: build
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - echo "Building Docker image $DOCKER_IMAGE:$DOCKER_TAG"
    - docker build -t $DOCKER_IMAGE:$DOCKER_TAG .
    - docker tag  $DOCKER_IMAGE:$DOCKER_TAG $DOCKER_IMAGE:latest
    - docker push $DOCKER_IMAGE:$DOCKER_TAG
    - docker push $DOCKER_IMAGE:latest
  only:
    - main
    - develop

# ═══════════════════════════════════════════════════════════════════════════════
# STAGE: test
# ═══════════════════════════════════════════════════════════════════════════════

test:
  stage: test
  script:
    - python3 -m venv .venv
    - . .venv/bin/activate
    - python -m pip install --quiet --upgrade pip
    - pip install --quiet -r requirements-dev.txt
    - echo "Running tests with coverage..."
    - pytest tests/ --cov=app --cov-report=term-missing --cov-report=xml:coverage.xml -v
  coverage: '/TOTAL.*\s+(\d+%)$/'
  artifacts:
    when: always
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    expire_in: 1 week

# ═══════════════════════════════════════════════════════════════════════════════
# STAGE: lint
# ═══════════════════════════════════════════════════════════════════════════════

lint:
  stage: lint
  script:
    - python3 -m venv .venv
    - . .venv/bin/activate
    - python -m pip install --quiet --upgrade pip
    - pip install --quiet flake8
    - echo "Linting Python source files..."
    - flake8 app.py tests/ --max-line-length=120 --statistics
    - echo "Lint passed ✔"

# ═══════════════════════════════════════════════════════════════════════════════
# STAGE: deploy-staging
# ═══════════════════════════════════════════════════════════════════════════════

deploy-staging:
  stage: deploy-staging
  environment:
    name: staging
    url: http://staging.example.com:5000
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - echo "Deploying $DOCKER_IMAGE:$DOCKER_TAG to staging..."
    - docker pull $DOCKER_IMAGE:$DOCKER_TAG
    - docker stop app-staging || true
    - docker rm   app-staging || true
    - |
      docker run -d \
        --name app-staging \
        --restart unless-stopped \
        -p 5000:5000 \
        -e FLASK_ENV=staging \
        $DOCKER_IMAGE:$DOCKER_TAG
    - echo "Staging deployment complete ✔"
  only:
    - develop

# ═══════════════════════════════════════════════════════════════════════════════
# STAGE: deploy-production
# ═══════════════════════════════════════════════════════════════════════════════

deploy-production:
  stage: deploy-production
  environment:
    name: production
    url: http://example.com:5000
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - echo "Deploying $DOCKER_IMAGE:$DOCKER_TAG to production..."
    - docker pull $DOCKER_IMAGE:$DOCKER_TAG
    - docker stop app-production || true
    - docker rm   app-production || true
    - |
      docker run -d \
        --name app-production \
        --restart unless-stopped \
        -p 5000:5000 \
        -e FLASK_ENV=production \
        $DOCKER_IMAGE:$DOCKER_TAG
    - echo "Production deployment complete ✔"
  when: manual
  only:
    - main
